on:
  workflow_dispatch:
  push:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOTNET_VERSION: 10.0.x
  PROJECT_PATH: src/AppConfigKeyVaultSample/AppConfigKeyVaultSample.csproj
  PUBLISH_PATH: src/AppConfigKeyVaultSample/publish
  ARTIFACT_NAME: webapp-package
permissions:
  id-token: write
  contents: read

jobs:
  deployment-step:
    runs-on: ubuntu-latest
    outputs:
      web_app_name: ${{ steps.deployment-outputs.outputs.web_app_name }}

    steps:
      - uses: actions/checkout@v6

      - uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}

      - name: Resolve deployment principal object ID
        id: deployment-principal
        shell: bash
        run: |
          object_id=$(az ad sp show --id "${{ vars.AZURE_CLIENT_ID }}" --query id --output tsv)
          echo "object_id=${object_id}" >> "$GITHUB_OUTPUT"

      - uses: azure/bicep-deploy@v2
        id: bicep-resources-deploy
        with:
          type: deployment
          operation: create
          scope: subscription
          name: main-${{ github.run_id }}
          location: Central US
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          template-file: infra/main.bicep
          parameters-file: infra/main.bicepparam
          parameters: |
            deploymentPrincipalObjectId=${{ steps.deployment-principal.outputs.object_id }}

      - name: Resolve deployment outputs
        id: deployment-outputs
        shell: bash
        run: |
          web_app_name=$(az deployment sub show \
            --name main-${{ github.run_id }} \
            --query "properties.outputs.webAppName.value" \
            --output tsv)

          echo "web_app_name=${web_app_name}" >> "$GITHUB_OUTPUT"

  build-step:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish application
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --output ${{ env.PUBLISH_PATH }}

      - name: Upload published artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.PUBLISH_PATH }}
          if-no-files-found: error

  release-step:
    runs-on: ubuntu-latest
    needs:
      - deployment-step
      - build-step

    steps:
      - name: Download published artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.PUBLISH_PATH }}

      - uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}

      - name: Deploy published app to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ needs.deployment-step.outputs.web_app_name }}
          package: ${{ env.PUBLISH_PATH }}
